name: Automated Core Data Synchronization V2

on:
  workflow_dispatch:

concurrency:
  group: killpv2-core-loop-v2
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  hybrid-core-processing:
    runs-on: ubuntu-latest
    steps:
    - name: Fetch Repository Framework
      uses: actions/checkout@v4

    - name: Prepare Local Environments
      run: |
        python3 -m pip install --upgrade pip
        pip3 install requests[socks]

    - name: Optimize Network Engine Stack (BBR & Kernel Tuning)
      run: |
        sudo tee -a /etc/sysctl.conf << 'EOF'
        net.core.default_qdisc = fq
        net.ipv4.tcp_congestion_control = bbr
        net.core.rmem_max = 67108864
        net.core.wmem_max = 67108864
        net.ipv4.tcp_rmem = 4096 87380 67108864
        net.ipv4.tcp_wmem = 4096 65536 67108864
        net.core.netdev_max_backlog = 10000
        net.ipv4.tcp_max_syn_backlog = 10000
        net.ipv4.tcp_tw_reuse = 1
        net.ipv4.tcp_fin_timeout = 15
        net.ipv4.tcp_keepalive_time = 600
        EOF
        sudo sysctl -p

    - name: Download & Install Dual Cores (Xray & Sing-Box)
      run: |
        sudo apt-get update && sudo apt-get install -y unzip wget curl
        
        XRAY_DL=$(echo "aHR0cHM6Ly9naXRodWIuY29tL1hUTFMvWHJheS1jb3JlL3JlbGVhc2VzL2xhdGVzdC9kb3dubG9hZC9YcmF5LWxpbnV4LTY0LnppcA==" | base64 -d)
        wget $XRAY_DL -O xray.zip
        sudo unzip -o xray.zip -d /usr/local/bin/ xray
        sudo chmod +x /usr/local/bin/xray
        
        curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0-alpha.5/sing-box-1.11.0-alpha.5-linux-amd64.tar.gz
        tar -xzf sing-box.tar.gz
        sudo mv sing-box-*-linux-amd64/sing-box /usr/local/bin/
        sudo chmod +x /usr/local/bin/sing-box
        
        sudo mkdir -p /usr/local/etc/xray
        sudo chmod -R 777 /usr/local/etc/xray

    - name: Resolve Runner Public IP Infrastructure
      run: |
        RUNNER_IP=$(curl -s https://api.ipify.org)
        echo "🎯 GitHub Actions Runner Public IP: $RUNNER_IP"
        echo "$RUNNER_IP" > active_runner_ip.txt
        echo "IP_RESOLVED=$RUNNER_IP" >> $GITHUB_ENV

    - name: Launch Operational Engines (Xray & Sing-Box Parallel)
      run: |
        echo "🚀 Starting Dual-Core Hybrid Network..."
        nohup xray run -c xray_config.json > xray_runtime.log 2>&1 &
        nohup sing-box run -c singbox_config.json > singbox_runtime.log 2>&1 &
        sleep 3
        ps aux | grep -E 'xray|sing-box'

    - name: Launch Operational Backend Analytics Worker
      env:
        SUB_REPO_TOKEN: ${{ secrets.GH_PAT2 }}
      run: |
        python3 -u analytics_worker.py

    - name: Commit and Save State to Repository
      if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add panel_db.json || true
        git commit -m "🔄 V2: Save database bytes state [Skip CI]" || true
        git push || true

    - name: Trigger Successive Pipeline Execution Loop
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        gh workflow run data-sync.yml --ref main
        echo "⛓️ Next V2 cycle synchronized."
